<div class="bg-white rounded-lg shadow p-6 max-w-3xl mx-auto">
    <h2 class="text-2xl font-semibold text-gray-900 mb-2">Профиль</h2>
    <p class="text-sm text-gray-500 mb-6">Данные вашего аккаунта.</p>

    <div id="profileLoadError" class="hidden mb-4 p-3 rounded-md bg-red-50 text-red-700 text-sm"></div>

    <div id="profileViewSection">
        <div class="flex flex-wrap items-start gap-4 mb-6">
            <div id="profileLetterBadge" class="w-16 h-16 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-2xl shrink-0" aria-hidden="true"><i class="fas fa-user"></i></div>
            <div class="flex-1 min-w-[200px]">
                <div class="flex flex-wrap justify-between gap-3 items-start mb-4">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900" id="profileName">—</h3>
                        <p class="text-gray-600 text-sm" id="profileLogin">—</p>
                        <p class="text-gray-500 text-xs mt-1" id="profileRoles">—</p>
                    </div>
                    <button type="button" id="editProfileBtn" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700">
                        Редактировать
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                    <div>
                        <span class="block text-xs font-medium text-gray-500 mb-1">Эл. почта</span>
                        <p class="text-gray-900" id="profileEmail">—</p>
                    </div>
                    <div>
                        <span class="block text-xs font-medium text-gray-500 mb-1">Пол</span>
                        <p class="text-gray-900" id="profileGender">—</p>
                    </div>
                    <div>
                        <span class="block text-xs font-medium text-gray-500 mb-1">Дата рождения</span>
                        <p class="text-gray-900" id="profileBirthday">—</p>
                    </div>
                    <div>
                        <span class="block text-xs font-medium text-gray-500 mb-1">В системе с</span>
                        <p class="text-gray-900" id="profileJoined">—</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="profileEditSection" class="hidden border-t border-gray-200 pt-6 mt-6">
        <h3 class="text-lg font-medium text-gray-900 mb-4">Редактирование профиля</h3>
        <form id="profileEditForm" class="space-y-4 max-w-md">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Имя</label>
                <input type="text" id="editName" name="newName" required class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm" autocomplete="name" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Эл. почта</label>
                <input type="email" id="editEmail" name="newEmail" required class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm" autocomplete="email" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Пол</label>
                <select id="editGender" name="newGender" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                    <option value="0">Женский</option>
                    <option value="1">Мужской</option>
                    <option value="2">Не указан</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Дата рождения</label>
                <input type="date" id="editBirthday" name="newBirthday" required class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm" />
            </div>
            <div class="flex gap-2 pt-2">
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700">Сохранить</button>
                <button type="button" id="cancelEditProfileBtn" class="px-4 py-2 bg-gray-200 text-gray-800 text-sm rounded-md hover:bg-gray-300">Отмена</button>
            </div>
        </form>
    </div>

    <div class="border-t border-gray-200 pt-6 mt-6">
        <h3 class="text-lg font-medium text-gray-900 mb-2">Безопасность</h3>
        <form id="changePasswordForm" class="space-y-3 max-w-md">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Новый пароль</label>
                <input type="password" id="newPassword" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm" autocomplete="new-password" minlength="4" required />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Подтверждение</label>
                <input type="password" id="newPasswordConfirm" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm" autocomplete="new-password" minlength="4" required />
            </div>
            <button type="submit" class="px-4 py-2 bg-gray-800 text-white text-sm rounded-md hover:bg-gray-900">Сменить пароль</button>
        </form>
    </div>
</div>
