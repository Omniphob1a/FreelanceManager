<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex items-center">
            <div class="p-3 rounded-full bg-blue-100 text-blue-600 mr-4">
                <i class="fas fa-project-diagram text-xl"></i>
            </div>
            <div>
                <p class="text-sm text-gray-500">Всего проектов</p>
                <h3 class="text-2xl font-bold" id="totalProjects">0</h3>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex items-center">
            <div class="p-3 rounded-full bg-green-100 text-green-600 mr-4">
                <i class="fas fa-tasks text-xl"></i>
            </div>
            <div>
                <p class="text-sm text-gray-500">Активные проекты</p>
                <h3 class="text-2xl font-bold" id="activeProjects">0</h3>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex items-center">
            <div class="p-3 rounded-full bg-purple-100 text-purple-600 mr-4">
                <i class="fas fa-check-circle text-xl"></i>
            </div>
            <div>
                <p class="text-sm text-gray-500">Завершено</p>
                <h3 class="text-2xl font-bold" id="completedProjects">0</h3>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex items-center">
            <div class="p-3 rounded-full bg-yellow-100 text-yellow-600 mr-4">
                <i class="fas fa-clock text-xl"></i>
            </div>
            <div>
                <p class="text-sm text-gray-500">Ближайшие дедлайны</p>
                <h3 class="text-2xl font-bold" id="upcomingDeadlines">0</h3>
            </div>
        </div>
    </div>
</div>

<div class="mb-8">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-gray-900">Последние проекты</h2>
        <a href="#projects" class="text-sm text-blue-600 hover:text-blue-800">
            Все проекты
        </a>
    </div>

    <div id="dashboardProjects" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="bg-white rounded-lg shadow p-4 h-32 animate-pulse"></div>
        <div class="bg-white rounded-lg shadow p-4 h-32 animate-pulse"></div>
        <div class="bg-white rounded-lg shadow p-4 h-32 animate-pulse"></div>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold text-gray-900">Статусы проектов</h3>
            <select id="statusChartRange" class="text-sm border border-gray-300 rounded-md px-3 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="30">Последние 30 дней</option>
                <option value="90">Последние 90 дней</option>
                <option value="365">Последний год</option>
                <option value="all">За все время</option>
            </select>
        </div>
        <div class="chart-container h-64">
            <canvas id="statusChart"></canvas>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold text-gray-900">Сроки задач</h3>
            <select id="deadlineChartRange" class="text-sm border border-gray-300 rounded-md px-3 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="30">Последние 30 дней</option>
                <option value="90">Последние 90 дней</option>
                <option value="365">Последний год</option>
                <option value="all">За все время</option>
            </select>
        </div>
        <div class="chart-container h-64">
            <canvas id="deadlineChart"></canvas>
        </div>
    </div>
</div>
