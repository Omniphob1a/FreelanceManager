<!-- Фрагмент для SPA (без <html>); полный документ ломает innerHTML — см. routing.htmlToContentFragment -->
<div class="container mx-auto px-4 py-8">
    <header class="mb-8">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold text-gray-900">Мои проекты</h1>
          <p class="text-gray-600 mt-1">Управляйте и отслеживайте проекты в одном месте</p>
        </div>
        <button id="newProjectBtn" class="btn-primary flex items-center self-start md:self-auto" type="button">
          <i class="fas fa-plus mr-2"></i> Новый проект
        </button>
      </div>
    </header>

    <section class="mb-6">
      <div class="flex justify-between items-center">
        <div class="relative">
          <button id="toggleFiltersBtn" class="btn-secondary relative" type="button" aria-expanded="false" aria-controls="filtersPanel">
            <i class="fas fa-filter mr-2"></i> Фильтры
            <span id="filterCounter" class="filter-counter hidden">0</span>
          </button>
        </div>
        
        <div class="flex items-center space-x-4">
          <div class="hidden md:flex items-center space-x-2">
            <span class="text-sm text-gray-500">Показывать:</span>
            <select id="itemsPerPageSelect" class="select-sm">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="25">25</option>
              <option value="50">50</option>
            </select>
          </div>

          <div class="flex items-center space-x-1 bg-gray-100 p-1 rounded-lg">
            <button id="gridViewBtn" class="view-toggle active" type="button" aria-label="Сетка">
              <i class="fas fa-th-large"></i>
            </button>
            <button id="listViewBtn" class="view-toggle" type="button" aria-label="Список">
              <i class="fas fa-list"></i>
            </button>
          </div>
        </div>
      </div>

      <div id="filtersPanel" class="filters-panel">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6">
          <div class="filter-card">
            <label class="filter-label">Статус</label>
            <div class="space-y-2">
              <label class="filter-chip">
                <input type="checkbox" class="filter-status" value="0" />
                <span>Черновик</span>
              </label>
              <label class="filter-chip">
                <input type="checkbox" class="filter-status" value="1" />
                <span>Активный</span>
              </label>
              <label class="filter-chip">
                <input type="checkbox" class="filter-status" value="2" />
                <span>Завершен</span>
              </label>
              <label class="filter-chip">
                <input type="checkbox" class="filter-status" value="3" />
                <span>Архив</span>
              </label>
            </div>
          </div>

          <div class="filter-card">
            <label class="filter-label">Период создания</label>
            <div class="space-y-3">
              <input type="date" id="filterCreatedFrom" class="filter-input" placeholder="С даты" />
              <input type="date" id="filterCreatedTo" class="filter-input" placeholder="По дату" />
            </div>
          </div>

          <div class="filter-card">
            <label class="filter-label">Категория</label>
            <select id="filterCategory" class="filter-select">
              <option value="">Все категории</option>
              <option value="design">Дизайн</option>
              <option value="development">Разработка</option>
              <option value="frontend">Фронтенд</option>
              <option value="backend">Бэкенд</option>
              <option value="fullstack">Фулстек</option>
            </select>
          </div>

          <div class="filter-card">
            <label class="filter-label">Диапазон бюджета</label>
            <div class="space-y-3">
              <div class="relative">
                <span class="input-icon">$</span>
                <input type="number" id="filterMinBudget" class="filter-input pl-10" placeholder="Минимум" min="0" />
              </div>
              <div class="relative">
                <span class="input-icon">$</span>
                <input type="number" id="filterMaxBudget" class="filter-input pl-10" placeholder="Максимум" />
              </div>
            </div>
          </div>
        </div>

        <div class="filter-actions">
          <button id="applyFiltersBtn" class="btn-primary" type="button">
            <i class="fas fa-check-circle mr-2"></i> Применить
          </button>
          <button id="clearFiltersBtn" class="btn-secondary" type="button">
            <i class="fas fa-times mr-2"></i> Сбросить
          </button>
        </div>
      </div>
    </section>

    <div class="projects-info mb-6">
      <span id="projectsCount" class="projects-count">Загрузка проектов...</span>
    </div>

    <div id="projectsGrid" class="projects-grid"></div>

    <div id="projectsTable" class="projects-table hidden">
      <table class="w-full">
        <thead>
          <tr>
            <th class="table-header">Проект</th>
            <th class="table-header">Статус</th>
            <th class="table-header">Срок</th>
            <th class="table-header">Бюджет</th>
            <th class="table-header">Действия</th>
          </tr>
        </thead>
        <tbody id="projectsTableBody"></tbody>
      </table>
    </div>

    <div id="projectsLoader" class="loader">
      <i class="fas fa-spinner fa-spin mr-2"></i> Загрузка проектов...
    </div>

    <div id="noProjectsRow" class="empty-state hidden">
      <div class="empty-state-icon">
        <i class="fas fa-folder-open"></i>
      </div>
      <h3 class="empty-state-title">Проекты не найдены</h3>
      <p class="empty-state-description">Создайте первый проект</p>
      <button id="createFirstProjectBtn" class="btn-primary" type="button">
        <i class="fas fa-plus mr-2"></i> Создать проект
      </button>
    </div>

    <div id="paginationContainer" class="pagination-container mt-8"></div>
</div>

<input type="file" id="attachmentFile" style="display: none;" multiple />
