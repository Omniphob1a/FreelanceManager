<div class="min-h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8">
    <div class="text-center">
      <div class="mx-auto h-16 w-16 rounded-full bg-blue-600 flex items-center justify-center text-white">
        <i class="fas fa-project-diagram text-2xl"></i>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
        Вход в систему
      </h2>
      <p class="mt-2 text-sm text-gray-600">Используйте логин и пароль</p>
    </div>

    <form id="loginForm" class="mt-8 space-y-6">
      <div class="space-y-4">
        <!-- Username -->
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
            Логин
          </label>
          <input id="username" name="username" type="text" autocomplete="username" required
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
            placeholder="Введите логин">
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Пароль
          </label>
          <input id="password" name="password" type="password" autocomplete="current-password" required
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
            placeholder="••••••••">
        </div>
      </div>

      <!-- Button -->
      <div>
        <button type="submit"
          class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
          Войти
        </button>
      </div>

      <!-- Register link -->
      <div class="text-center text-sm">
        <a href="#" data-page="register" class="font-medium text-blue-600 hover:text-blue-500">
          Нет аккаунта? Зарегистрироваться
        </a>
      </div>
    </form>
  </div>
</div>
