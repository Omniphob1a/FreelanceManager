<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreelanceHub - Управление проектами</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%232563eb' width='32' height='32' rx='6'/%3E%3Ctext x='16' y='22' fill='white' font-size='14' font-family='system-ui' text-anchor='middle'%3EF%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
</head>
<body class="bg-gray-50">
    <!-- Mobile Menu Button -->
    <button class="mobile-menu-button fixed top-4 left-4 z-50 p-2 rounded-md bg-white shadow-md text-gray-700 hidden md:hidden transition-all duration-200 hover:bg-gray-100 hover:scale-105">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar -->
    <div class="sidebar bg-white h-screen fixed shadow-md flex flex-col w-64 transition-all duration-300">
        <!-- Logo -->
        <div class="p-4 flex items-center border-b border-gray-200">
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white shadow-md">
                <i class="fas fa-project-diagram"></i>
            </div>
            <span class="logo-text ml-3 text-xl font-semibold text-gray-800">FreelanceHub</span>
        </div>

        <!-- Сводка пользователя (без фото — буква на цветном фоне, текст после входа) -->
        <div class="p-4 border-b border-gray-200 flex items-center">
            <div id="sidebarUserBadge" class="w-10 h-10 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-sm ring-2 ring-transparent hover:ring-blue-500 transition-all"><i class="fas fa-user" aria-hidden="true"></i></div>
            <div class="ml-3 min-w-0">
                <div class="text-sm font-medium text-gray-800 truncate" id="sidebarUserName">—</div>
                <div class="text-xs text-gray-500 truncate" id="sidebarUserSubtitle">Не выполнен вход</div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex-1 overflow-y-auto">
            <nav class="p-2">
                <div class="space-y-1">
                    <a href="#dashboard" data-page="dashboard" class="nav-item flex items-center px-3 py-2 text-sm font-medium rounded-md text-white bg-blue-600 shadow-sm hover:shadow-md transition-all duration-200">
                        <i class="fas fa-home text-white"></i>
                        <span class="sidebar-text ml-3">Панель</span>
                    </a>
                    <a href="#projects" data-page="projects" class="nav-item flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-all duration-200">
                        <i class="fas fa-project-diagram text-gray-500"></i>
                        <span class="sidebar-text ml-3">Проекты</span>
                    </a>
                    <a href="#tasks" data-page="tasks" class="nav-item flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-all duration-200">
                        <i class="fas fa-tasks text-gray-500"></i>
                        <span class="sidebar-text ml-3">Задачи</span>
                    </a>
                    <a href="#profile" data-page="profile" class="nav-item flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-all duration-200">
                        <i class="fas fa-user text-gray-500"></i>
                        <span class="sidebar-text ml-3">Профиль</span>
                    </a>
                </div>
            </nav>
        </div>

        <div class="p-4 border-t border-gray-200 space-y-2">
            <button type="button" id="appLogoutBtn" class="w-full text-left px-2 py-2 text-sm text-red-600 hover:bg-red-50 rounded-md transition-colors hidden">
                <i class="fas fa-sign-out-alt mr-2"></i>Выйти
            </button>
            <div class="flex justify-end">
                <button type="button" class="text-gray-500 hover:text-gray-700 transition-all duration-200 hover:scale-110" aria-label="Collapse sidebar">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content ml-64">
        <!-- Header -->
        <header class="bg-white shadow-sm sticky top-0 z-40 transition-all duration-300">
            <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center">
                <h1 id="pageTitle" class="text-lg font-semibold text-gray-900">Панель</h1>
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <label for="appLanguageSwitcher" class="sr-only">Язык</label>
                        <select id="appLanguageSwitcher" class="text-sm border border-gray-300 rounded-md px-2 py-1 bg-white">
                            <option value="ru">RU</option>
                            <option value="en">EN</option>
                        </select>
                    </div>
                    <div class="relative">
                        <button type="button" id="userMenuButton" class="flex items-center text-sm rounded-full focus:outline-none transition-all duration-200 hover:scale-105" aria-label="Профиль">
                            <span class="sr-only">Профиль</span>
                            <div id="headerUserBadge" class="h-8 w-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-xs ring-2 ring-transparent hover:ring-blue-500 transition-all"><i class="fas fa-user" aria-hidden="true"></i></div>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <main id="content" class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 animate-fade-in">
            <!-- Контент будет загружаться динамически -->
        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2 w-80"></div>

    <!-- Скрипты -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <!-- App entry -->
    <script type="module" src="/js/app.js"></script>

    <div id="modal-root"></div>
</body>
</html>
