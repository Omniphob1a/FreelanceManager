# ============================
# Namespace
# ============================
apiVersion: v1
kind: Namespace
metadata:
  name: app

---

# ============================
# Secrets
# ============================
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: app
type: Opaque
data:
  username: cG9zdGdyZXM=   # "postgres"
  password: MTIz           # "123"

---

# ============================
# Postgres Deployments + Services
# ============================

# Projects DB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: projects-db
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: projects-db
  template:
    metadata:
      labels:
        app: projects-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: projects
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: password
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: projects-db
  namespace: app
spec:
  selector:
    app: projects-db
  ports:
    - port: 5432
      targetPort: 5432

