# ============================
# Kafka + Zookeeper
# ============================
# Zookeeper
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: bitnami/zookeeper:latest
          env:
            - name: ALLOW_ANONYMOUS_LOGIN
              value: "yes"
          ports:
            - containerPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: app
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181

# Kafka
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:latest
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"
          ports:
            - containerPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: app
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092

---

# ============================
# API Deployments (подправлены переменные)
# ============================

# Projects API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: projects-api
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: projects-api
  template:
    metadata:
      labels:
        app: projects-api
    spec:
      containers:
        - name: projects-api
          image: freelance/projects-api:dev
          ports:
            - containerPort: 80
          env:
            - name: DB_HOST
              value: projects-db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: password
            - name: KAFKA_BROKER
              value: kafka:9092
---
apiVersion: v1
kind: Service
metadata:
  name: projects-api
  namespace: app
spec:
  selector:
    app: projects-api
  ports:
    - port: 80
      targetPort: 80

