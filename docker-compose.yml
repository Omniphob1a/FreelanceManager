version: '3.8'

services:
  # -------------------
  # Users API
  # -------------------
  users-api:
    build:
      context: ./Users
      dockerfile: Users.Api/Dockerfile
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__UsersDbContext=Server=users-db;Port=5432;Database=users;User Id=postgres;Password=123;
      - Hangfire__Storage__ConnectionString=Server=hangfire-db;Port=5432;Database=hangfire;User Id=postgres;Password=123;
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__SecurityProtocol=Plaintext
    depends_on:
      - users-db
      - hangfire-db
      - redis
      - kafka

  # -------------------
  # Projects API
  # -------------------
  projects-api:
    build:
      context: ./Projects
      dockerfile: Projects.Api/Dockerfile
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__ProjectsDbContext=Server=projects-db;Port=5432;Database=projects;User Id=postgres;Password=123;
      - Hangfire__Storage__ConnectionString=Server=hangfire-db;Port=5432;Database=hangfire;User Id=postgres;Password=123;
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__SecurityProtocol=Plaintext
    depends_on:
      - projects-db
      - hangfire-db
      - redis
      - kafka

  # -------------------
  # Tasks API
  # -------------------
  tasks-api:
    build:
      context: ./Tasks
      dockerfile: Tasks.Api/Dockerfile
    ports:
      - "5003:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__ProjectTasksDbContext=Server=tasks-db;Port=5432;Database=tasks;User Id=postgres;Password=123;
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__SecurityProtocol=Plaintext
    depends_on:
      - tasks-db

  # -------------------
  # Gateway
  # -------------------
  gateway:
    build:
      context: ./Gateway
      dockerfile: Gateway/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__SecurityProtocol=Plaintext
    depends_on:
      - users-api
      - projects-api
      - tasks-api
      - redis
      - kafka

  # -------------------
  # Frontend
  # -------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - API_URL=http://gateway:8080
    depends_on:
      - gateway

  # -------------------
  # PostgreSQL Databases
  # -------------------
  hangfire-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: hangfire
    ports:
      - "5434:5432"
    volumes:
      - hangfire_pgdata:/var/lib/postgresql/data

  users-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: users
    ports:
      - "5433:5432"
    volumes:
      - users_pgdata:/var/lib/postgresql/data

  projects-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: projects
    ports:
      - "5432:5432"
    volumes:
      - projects_pgdata:/var/lib/postgresql/data

  tasks-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: tasks
    ports:
      - "5435:5432"
    volumes:
      - tasks_pgdata:/var/lib/postgresql/data

  notifications-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: notifications
    ports:
      - "5436:5432"
    volumes:
      - notifications_pgdata:/var/lib/postgresql/data

  # -------------------
  # Redis
  # -------------------
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # -------------------
  # Kafka & Zookeeper
  # -------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CREATE_TOPICS: "members:1:1,users:1:1,projects:1:1,object-confirm-responses:1:1,projects.confirm-requested:1:1"

volumes:
  projects_pgdata:
  tasks_pgdata:
  notifications_pgdata:
  users_pgdata:
  hangfire_pgdata:
  redisinsight_data: {}
