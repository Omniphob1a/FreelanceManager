# --------------------------
# Prometheus (very basic)
# --------------------------
# --------------------------
# Prometheus (with Kubernetes service discovery)
# --------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: lab
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      scrape_timeout: 5s

    scrape_configs:
      # Self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Discover all gateway services in the lab namespace
      - job_name: 'gateway'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['lab']
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: 'gateway.*'
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: 'http'  # убедись, что порт в service имеет имя http или оставь пустым для любого порта
            action: keep

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: lab
spec:
  selector: {app: prometheus}
  type: NodePort
  ports:
    - port: 9090
      nodePort: 31969
---
# --------------------------
# Grafana (basic) с автоматической конфигурацией
# --------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: lab
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "5s"
          queryTimeout: "60s"
          httpMethod: "GET"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: lab
data:
  gateway-dashboard.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: lab
  labels: {app: grafana}
spec:
  replicas: 1
  selector:
    matchLabels: {app: grafana}
  template:
    metadata:
      labels: {app: grafana}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_INSTALL_PLUGINS
              value: "grafana-piechart-panel"
            - name: GF_SECURITY_ALLOW_EMBEDDING
              value: "true"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-config
              mountPath: /etc/grafana/provisioning/dashboards
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: grafana-storage
          emptyDir: {}
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-config
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: lab
spec:
  selector: {app: grafana}
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
---
# --------------------------
# Gateway (YARP) с Prometheus
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: lab
  labels: {app: gateway}
spec:
  replicas: 1
  selector:
    matchLabels: {app: gateway}
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: fm-gateway:local
          imagePullPolicy: Always
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080" # слушаем все интерфейсы на 8080
            # Kafka / другие переменные оставляем по необходимости
            - name: Kafka__BootstrapServers
              value: "kafka:9092"
            - name: Kafka__SecurityProtocol
              value: "Plaintext"
          ports:
            - containerPort: 8080 # основной API + /metrics endpoint
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: lab
spec:
  selector:
    app: gateway
  type: NodePort
  ports:
    - port: 8080
      nodePort: 32386
      targetPort: 8080
---
