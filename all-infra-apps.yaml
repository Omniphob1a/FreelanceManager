# apps-main.yaml
# Namespace lab
---
# --------------------------
# Redis
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: lab
  labels: {app: redis}
spec:
  replicas: 1
  selector:
    matchLabels: {app: redis}
  template:
    metadata:
      labels: {app: redis}
    spec:
      containers:
        - name: redis
          image: redis:7
          ports: [{containerPort: 6379}]
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: lab
spec:
  selector: {app: redis}
  ports:
    - port: 6379
      targetPort: 6379
---
# --------------------------
# Temporary Postgres DBs (users, projects, tasks, hangfire)
# --------------------------
# Users DB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-db
  namespace: lab
  labels: {app: users-db}
spec:
  replicas: 1
  selector:
    matchLabels: {app: users-db}
  template:
    metadata:
      labels: {app: users-db}
    spec:
      containers:
      - name: postgres
        image: postgres:16
        env:
          - name: POSTGRES_USER
            value: "postgres"
          - name: POSTGRES_PASSWORD
            value: "123"
          - name: POSTGRES_DB
            value: "users"
        ports:
          - containerPort: 5432
        volumeMounts:
          - name: pgdata
            mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: users-db
  namespace: lab
spec:
  selector: {app: users-db}
  ports:
    - port: 5432
      targetPort: 5432
