apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: users-db
  namespace: fm-app
spec:
  serviceName: "users-db"
  replicas: 1
  selector:
    matchLabels:
      app: users-db
  template:
    metadata:
      labels:
        app: users-db
    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "123"
        - name: POSTGRES_DB
          value: "users"
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "pg_isready -U postgres -d users -h localhost"
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: users-db
  namespace: fm-app
spec:
  selector:
    app: users-db
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
