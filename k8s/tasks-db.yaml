apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tasks-db
  namespace: fm-app
spec:
  serviceName: "tasks-db"
  replicas: 1
  selector:
    matchLabels:
      app: tasks-db
  template:
    metadata:
      labels:
        app: tasks-db
    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "123"
        - name: POSTGRES_DB
          value: "tasks"
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "pg_isready -U postgres -d tasks -h localhost"
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tasks-db
  namespace: fm-app
spec:
  selector:
    app: tasks-db
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
