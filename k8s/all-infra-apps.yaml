# --------------------------
# Prometheus (very basic)
# --------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: lab
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'gateways'
        metrics_path: '/metrics'
        static_configs:
          - targets:
            - 'gateway:8080'

      - job_name: 'apis'
        metrics_path: '/metrics'
        static_configs:
          - targets:
            - 'users-api:80'
            - 'tasks-low:8080'
            - 'tasks-mid:8080'
            - 'tasks-ultra:8080'
            - 'projects-api:80'

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: lab
  labels: {app: prometheus}
spec:
  replicas: 1
  selector:
    matchLabels: {app: prometheus}
  template:
    metadata:
      labels: {app: prometheus}
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          imagePullPolicy: IfNotPresent
          args: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=1h"]
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          ports:
            - containerPort: 9090
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: lab
spec:
  selector: {app: prometheus}
  type: NodePort
  ports:
    - port: 9090
      nodePort: 31969
---
# --------------------------
# Grafana (basic)
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: lab
  labels: {app: grafana}
spec:
  replicas: 1
  selector:
    matchLabels: {app: grafana}
  template:
    metadata:
      labels: {app: grafana}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: lab
spec:
  selector: {app: grafana}
  type: NodePort
  ports:
    - port: 3000
      nodePort: 30000
---
# --------------------------
# Gateway (YARP) — single instance now (was mid/slow/ultra)
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: lab
  labels: {app: gateway}
spec:
  replicas: 2
  selector:
    matchLabels: {app: gateway}
  template:
    metadata:
      labels: {app: gateway}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
        prometheus.io/scheme: "http"
    spec:
      containers:
        - name: gateway
          image: fm-gateway:local
          imagePullPolicy: IfNotPresent
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://*:8080"
            - name: Kafka__BootstrapServers
              value: "kafka:9092"
            - name: Kafka__SecurityProtocol
              value: "Plaintext"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: lab
spec:
  selector: {app: gateway}
  type: NodePort
  ports:
    - port: 8080
      nodePort: 32386
---
# --------------------------
# Frontend
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: lab
  labels: {app: frontend}
spec:
  replicas: 1
  selector:
    matchLabels: {app: frontend}
  template:
    metadata:
      labels: {app: frontend}
    spec:
      containers:
        - name: frontend
          image: fm-frontend:local
          imagePullPolicy: IfNotPresent
          env:
            - name: API_URL
              value: "http://gateway:8080"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: lab
spec:
  selector: {app: frontend}
  type: NodePort
  ports:
    - port: 80
      nodePort: 30902
---
# --------------------------
# Apps: users, tasks (now low/mid/ultra), projects (single instance each)
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
