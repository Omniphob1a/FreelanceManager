apiVersion: apps/v1
kind: Deployment
metadata:
  name: projects-api
  namespace: fm-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projects-api
  template:
    metadata:
      labels:
        app: projects-api
    spec:
      containers:
      - name: projects-api
        image: fm/projects:local
        ports:
        - containerPort: 80
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:80"
        - name: ConnectionStrings__ProjectsDbContext
          value: "Server=projects-db;Port=5432;Database=projects;User Id=postgres;Password=123;"
        - name: Hangfire__Storage__ConnectionString
          value: "Server=hangfire-db;Port=5432;Database=hangfire;User Id=postgres;Password=123;"
        - name: Kafka__BootstrapServers
          value: "kafka:9092"
        - name: Kafka__GroupId
          value: "projects-service"
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 8
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: projects-api
  namespace: fm-app
spec:
  selector:
    app: projects-api
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
